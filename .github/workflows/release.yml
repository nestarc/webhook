name: Release

# Publishes @nestarc/webhook to npm when a tag matching `v*.*.*` is
# pushed, or when the workflow is dispatched manually (emergency fallback).
#
# Flow:
#   1. verify job reads package.json version and confirms it matches the tag
#      or the manually supplied expected version.
#   2. build-and-test runs the full prepublishOnly chain as a final safety net.
#   3. publish runs `npm publish --provenance --access public` and creates a
#      GitHub Release with the CHANGELOG excerpt.
#
# Required secrets:
#   - NPM_TOKEN — an Automation token scoped to publish rights on @nestarc/*.
#                 Create at https://www.npmjs.com/settings/<user>/tokens and add
#                 under repo Settings > Secrets and variables > Actions.
#
# Permissions:
#   - id-token: write is required for `--provenance` OIDC signing.
#   - contents: write is required to create the GitHub Release.
#
# Security notes:
#   - No untrusted inputs are referenced in run: commands. The only
#     templated expressions come via explicit `env:` blocks
#     (GIT_REF_NAME, EXPECTED_VERSION, PKG_VERSION, VERSION) so shell
#     interpolation sees plain environment variables, never raw template
#     substitution.
#   - The `pack` step proves the tarball is publish-ready BEFORE the
#     irreversible npm publish step.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      expected_version:
        description: 'Expected package.json version to publish'
        required: true
        type: string
      dry_run:
        description: 'Run the full pipeline but skip the actual npm publish (default: false)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Read package version
        id: read
        run: |
          VERSION=$(npm pkg get version --workspaces=false | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package.json version: $VERSION"

      - name: Ensure git tag matches package.json (tag-push only)
        if: github.event_name == 'push'
        env:
          GIT_REF_NAME: ${{ github.ref_name }}
          PKG_VERSION: ${{ steps.read.outputs.version }}
        run: |
          TAG_VERSION="${GIT_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GIT_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag $GIT_REF_NAME matches package.json $PKG_VERSION"

      - name: Ensure expected version matches package.json (manual only)
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          PKG_VERSION: ${{ steps.read.outputs.version }}
        run: |
          if [ "$EXPECTED_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Expected version $EXPECTED_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Expected version $EXPECTED_VERSION matches package.json $PKG_VERSION"

  build-and-test:
    name: Full prepublishOnly chain
    needs: verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: webhook_test
          POSTGRES_PASSWORD: webhook_test
          POSTGRES_DB: webhook_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U webhook_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://webhook_test:webhook_test@localhost:5433/webhook_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Clean + lint + test + build
        run: npm run prepublishOnly

      - name: E2E tests
        run: npm run test:e2e

      - name: Pack (dry run)
        run: npm pack --dry-run

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/
            package.json
            README.md
            LICENSE
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to npm
    needs: [verify, build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --dry-run

      - name: Publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Extract CHANGELOG entry for this version
        if: github.event_name == 'push'
        id: changelog
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" {flag=1; next}
              flag && /^## \[/ {flag=0}
              flag {print}
            ' CHANGELOG.md > release-body.md
          fi
          if [ ! -s release-body.md ]; then
            echo "Release $VERSION" > release-body.md
            echo "" >> release-body.md
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." >> release-body.md
          fi
          echo "body-file=release-body.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.body-file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
