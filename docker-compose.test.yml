services:
  postgres:
    # Keep this local test database in sync with the PostgreSQL service
    # definitions in .github/workflows/ci.yml and release.yml.
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: webhook_test
      POSTGRES_PASSWORD: webhook_test
      POSTGRES_DB: webhook_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U webhook_test -d webhook_test']
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s
